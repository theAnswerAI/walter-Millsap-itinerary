<style>
  :root {
    --navy: #0B1F3A;
    --navy-light: #1A365D;
    --gold: #C9973A;
    --gold-light: #F0C97A;
    --cream: #FAF7F2;
    --slate: #4A5568;
    --sky: #E8F2FC;
    --border: #E2D9CC;
    --accent-green: #2D6A4F;

  body {

    line-height: 1.6;

  .cover {

    pointer-events: none;

  .agency-badge {

    letter-spacing: 2px; text-transform: uppercase;

  }
  .action-btn {

  }
  .action-btn:hover { background: rgba(255,255,255,0.2); }

  .cover h1 {

  }
  .cover h1 em { font-style: italic; color: var(--gold-light); font-weight: 400; }
  .cover-sub { font-size: 18px; color: rgba(255,255,255,0.7); font-weight: 300; margin-bottom: 40px; }
  
  .cover-meta { display: flex; flex-wrap: wrap; gap: 16px; }
  .meta-pill {
    background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px 20px; flex: 1; min-width: 140px;
    backdrop-filter: blur(4px);
  }
  .meta-pill .label {

    color: var(--gold-light); font-family: 'DM Mono', monospace; display: block; margin-bottom: 4px;
  }
  .meta-pill .value { font-size: 15px; font-weight: 500; color: var(--white); }

  /* ── TIMELINE SPINE ── */
  .timeline { max-width: 880px; margin: -30px auto 0; padding: 0 20px 60px; position: relative; z-index: 10; }

  /* ── DAY CARD ── */
  .day-card {

    box-shadow: var(--shadow); background: var(--white);
    border: 1px solid var(--border);
  }

  .day-header {
    background: var(--white); color: var(--navy);

    border-bottom: 1px solid var(--border);
  }

  .day-label {

  }
  .day-title { font-size: 22px; font-weight: 700; color: var(--navy); }

    margin-left: auto; text-align: right; font-size: 14px;

  }

  .card-body { padding: 28px; }

  /* ── SECTIONS ── */
  .section-title {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
    margin-bottom: 16px; margin-top: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: attr(data-icon); font-size: 16px; }

  /* ── FLIGHT BLOCK ── */

  .flight-line { height: 2px; background: var(--border); position: relative; margin: 12px 0; }
  .flight-line::after { content: '✈'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--white); padding: 0 8px; font-size: 16px; color: var(--gold); }
  .flight-info { font-size: 12px; color: var(--slate); font-weight: 500; }
  
  .flight-meta { display: flex; gap: 8px; flex-wrap: wrap; background: var(--sky); padding: 12px; border-radius: 6px; }
  .flight-tag { font-size: 11px; font-weight: 600; background: var(--white); border: 1px solid rgba(11,31,58,0.1); color: var(--navy); padding: 4px 10px; border-radius: 4px; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px;}
  .flight-tag.airline { background: var(--navy); color: var(--white); border: none; }
